<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welkom | Mijn Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero {
            max-width: 800px;
            padding: 40px;
        }
        h1 {
            font-size: 4.5rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        p {
            font-size: 1.6rem;
            margin-bottom: 40px;
            opacity: 0.95;
        }
        .btn {
            display: inline-block;
            padding: 16px 45px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 600;
            transition: all 0.4s ease;
        }
        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Hoi daar! 👋</h1>
        <p>Dit is een simpele en stijlvolle landing page.<br>Made with Grok & GitHub.</p>
        <a href="#" class="btn">Start Nu</a>
    </div>
</body>
</html>
